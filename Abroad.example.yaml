---
mixed-port: 7890
mode: rule
allow-lan: false
ipv6: false
tun:
  enable: true
  stack: gvisor
  auto-route: true
  auto-detect-interface: true
dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  use-hosts: true
  use-system-hosts: true
  fake-ip-filter:
  - "*.lan"
  - "*.local"
  - "*.home.arpa"
  - localhost
  - localhost.*
  default-nameserver:
  - 77.88.8.8
  - 1.1.1.1
  - 8.8.8.8
  nameserver:
  - https://cloudflare-dns.com/dns-query
  - https://dns.google/dns-query
  - https://dns.quad9.net/dns-query
  proxy-server-nameserver:
  - https://cloudflare-dns.com/dns-query
  - https://dns.google/dns-query
  - 77.88.8.8
  direct-nameserver:
  - system
  - https://cloudflare-dns.com/dns-query
  direct-nameserver-follow-policy: true
  nameserver-policy:
    "+.ru":
    - 77.88.8.8
    - system
    "+.su":
    - 77.88.8.8
    - 1.1.1.1
    "+.xn--p1ai":
    - 77.88.8.8
    - 1.1.1.1
proxy-providers:
  vless-space:
    type: http
    url: "https://YOUR_CLASH_SUBSCRIPTION_URL"
    path: ./proxy_providers/vless-space.yaml
    interval: 3600
    proxy: DIRECT
    header:
      User-Agent:
      - Agent
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
      timeout: 5000
proxies: []
proxy-groups:
- name: MANUAL
  type: select
  proxies:
  - LOW-RESTRICT-FOREIGN
  - FASTER-FOREIGN
  - RU-PROXY
  - RU
  - DIRECT
  use:
  - vless-space
- name: PROXY
  type: select
  proxies:
  - FASTER-FOREIGN
  - MANUAL
  - LOW-RESTRICT-FOREIGN
  - RU-PROXY
  - RU
  - DIRECT
- name: LOW-RESTRICT-FOREIGN
  type: select
  proxies:
  - LOW-RESTRICT-AUTO
  - LOW-RESTRICT-MANUAL
- name: LOW-RESTRICT-AUTO
  type: url-test
  url: https://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
  lazy: true
  filter: '^(?!.*(?:USA|United States|Canada|Singapore|Hong Kong|France|United Kingdom|UK|UAE|United Arab Emirates|Russia|Россия|YT|LTE|Torrent|\| RU)).*(?:Finland|Poland|Sweden).*Gemini.*$'
  use:
  - vless-space
- name: LOW-RESTRICT-MANUAL
  type: select
  filter: '^(?!.*(?:USA|United States|Canada|Singapore|Hong Kong|France|United Kingdom|UK|UAE|United Arab Emirates|Russia|Россия|YT|LTE|Torrent|\| RU)).*(?:Finland|Poland|Sweden).*Gemini.*$'
  use:
  - vless-space
- name: FASTER-FOREIGN
  type: url-test
  url: https://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
  lazy: true
  filter: '^(?!.*(?:USA|United States|Canada|Russia|Россия|YT|LTE|Torrent|\| RU)).*(?:Finland|Netherlands|Poland|Sweden).*Gemini.*$'
  use:
  - vless-space
- name: RU
  type: url-test
  url: http://connectivitycheck.gstatic.com/generate_204
  interval: 300
  tolerance: 50
  lazy: true
  filter: '^(?:.*Russia \| YT|.*Russia #2 \| YT|.*Russia \| LTE \| YT|.*Russia #2 \| LTE \| YT)$'
  use:
  - vless-space
- name: RU-PROXY
  type: fallback
  url: https://www.avito.ru
  interval: 300
  timeout: 5000
  lazy: false
  proxies:
  - RU
- name: RU-SITES
  type: select
  proxies:
  - RU-PROXY
  - RU

rule-providers:
  steam:
    type: http
    behavior: classical
    path: "./rules/steam.list"
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/Steam/Steam.list
    interval: 86400
  domains_geo_detect:
    type: http
    behavior: classical
    path: "./rules/domains_geo_detect.list"
    url: https://raw.githubusercontent.com/misha-tgshv/shadowrocket-configuration-file/refs/heads/main/rules/domains_geo_detect.list
    interval: 86400
  ru-bundle:
    type: http
    behavior: domain
    format: mrs
    path: "./rules/ru-bundle/rule.mrs"
    url: https://github.com/legiz-ru/mihomo-rule-sets/raw/main/ru-bundle/rule.mrs
    interval: 86400
  rknasnblock:
    type: http
    behavior: ipcidr
    format: mrs
    path: "./rules/ru-bundle/rknasnblock.mrs"
    url: https://github.com/legiz-ru/mihomo-rule-sets/raw/main/ru-bundle/rknasnblock.mrs
    interval: 86400
  ru-app-list:
    type: http
    behavior: classical
    format: yaml
    path: "./rules/ru-app-list.yaml"
    url: https://github.com/legiz-ru/mihomo-rule-sets/raw/main/other/ru-app-list.yaml
    interval: 86400
  common-openai:
    type: http
    behavior: classical
    format: text
    path: "./rules/vpn-set-rules/common-openai.list"
    url: https://raw.githubusercontent.com/Sereja3578/vpn-set-rules/main/Common/openai.list
    interval: 86400
  common-bybit-low-restrict:
    type: http
    behavior: classical
    format: text
    path: "./rules/vpn-set-rules/common-bybit-low-restrict.list"
    url: https://raw.githubusercontent.com/Sereja3578/vpn-set-rules/main/Common/bybit-low-restrict.list
    interval: 86400
  common-instagram-meta:
    type: http
    behavior: classical
    format: text
    path: "./rules/vpn-set-rules/common-instagram-meta.list"
    url: https://raw.githubusercontent.com/Sereja3578/vpn-set-rules/main/Common/instagram-meta.list
    interval: 86400
  common-ru-tlds:
    type: http
    behavior: classical
    format: text
    path: "./rules/vpn-set-rules/common-ru-tlds.list"
    url: https://raw.githubusercontent.com/Sereja3578/vpn-set-rules/main/Common/ru-tlds.list
    interval: 86400
  abroad-ozon:
    type: http
    behavior: classical
    format: text
    path: "./rules/vpn-set-rules/abroad-ozon.list"
    url: https://raw.githubusercontent.com/Sereja3578/vpn-set-rules/main/Abroad/ozon.list
    interval: 86400
  abroad-yandex:
    type: http
    behavior: classical
    format: text
    path: "./rules/vpn-set-rules/abroad-yandex.list"
    url: https://raw.githubusercontent.com/Sereja3578/vpn-set-rules/main/Abroad/yandex.list
    interval: 86400
  abroad-mailru:
    type: http
    behavior: classical
    format: text
    path: "./rules/vpn-set-rules/abroad-mailru.list"
    url: https://raw.githubusercontent.com/Sereja3578/vpn-set-rules/main/Abroad/mailru.list
    interval: 86400
  abroad-vk:
    type: http
    behavior: classical
    format: text
    path: "./rules/vpn-set-rules/abroad-vk.list"
    url: https://raw.githubusercontent.com/Sereja3578/vpn-set-rules/main/Abroad/vk.list
    interval: 86400
  abroad-rutube:
    type: http
    behavior: classical
    format: text
    path: "./rules/vpn-set-rules/abroad-rutube.list"
    url: https://raw.githubusercontent.com/Sereja3578/vpn-set-rules/main/Abroad/rutube.list
    interval: 86400
  abroad-mts:
    type: http
    behavior: classical
    format: text
    path: "./rules/vpn-set-rules/abroad-mts.list"
    url: https://raw.githubusercontent.com/Sereja3578/vpn-set-rules/main/Abroad/mts.list
    interval: 86400
  abroad-tbank:
    type: http
    behavior: classical
    format: text
    path: "./rules/vpn-set-rules/abroad-tbank.list"
    url: https://raw.githubusercontent.com/Sereja3578/vpn-set-rules/main/Abroad/tbank.list
    interval: 86400
rules:
- RULE-SET,common-openai,PROXY
- DOMAIN-SUFFIX,github.com,DIRECT
- DOMAIN-SUFFIX,githubusercontent.com,DIRECT
- DOMAIN,your-provider.example,DIRECT
- RULE-SET,common-bybit-low-restrict,LOW-RESTRICT-FOREIGN
- RULE-SET,steam,DIRECT
- RULE-SET,common-instagram-meta,DIRECT
- RULE-SET,domains_geo_detect,RU-SITES
- RULE-SET,abroad-yandex,RU-SITES
- RULE-SET,abroad-mailru,RU-SITES
- RULE-SET,abroad-vk,RU-SITES
- RULE-SET,abroad-rutube,RU-SITES
- RULE-SET,abroad-mts,RU-SITES
- RULE-SET,abroad-tbank,RU-SITES
- RULE-SET,abroad-ozon,RU-SITES
- RULE-SET,ru-bundle,RU-SITES
- RULE-SET,rknasnblock,RU-SITES,no-resolve
- RULE-SET,ru-app-list,RU-SITES
- DOMAIN-KEYWORD,steam,DIRECT
- DOMAIN-KEYWORD,valve,DIRECT
- DOMAIN-KEYWORD,sdr,DIRECT
- RULE-SET,common-ru-tlds,RU-SITES
- DOMAIN-SUFFIX,local,DIRECT
- IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
- IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
- IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
- IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
- IP-CIDR,169.254.0.0/16,DIRECT,no-resolve
- PROCESS-NAME,CrossOver,DIRECT
- PROCESS-NAME,wineserver,DIRECT
- PROCESS-NAME,wineloader,DIRECT
- PROCESS-NAME,winewrapper.exe,DIRECT
- PROCESS-NAME,winedevice.exe,DIRECT
- PROCESS-NAME,Menu Helper,DIRECT
- PROCESS-NAME,steam.exe,DIRECT
- PROCESS-NAME,steamservice.exe,DIRECT
- PROCESS-NAME,steamwebhelper.exe,DIRECT
- PROCESS-NAME-REGEX,(?i).*\.exe$,DIRECT
- PROCESS-PATH-REGEX,(?i).*CrossOver.*,DIRECT
- GEOIP,RU,RU-SITES
- MATCH,DIRECT
