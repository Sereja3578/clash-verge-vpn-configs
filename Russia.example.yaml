---
mixed-port: 7890
mode: rule
allow-lan: false
ipv6: false
tun:
  enable: true
  stack: gvisor
  auto-route: true
  auto-detect-interface: true
dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  use-hosts: true
  use-system-hosts: true
  fake-ip-filter:
  - "*.lan"
  - "*.local"
  - "*.home.arpa"
  - localhost
  - localhost.*
  default-nameserver:
  - 77.88.8.8
  - 1.1.1.1
  - 8.8.8.8
  nameserver:
  - 77.88.8.8
  - https://cloudflare-dns.com/dns-query
  - https://dns.google/dns-query
  proxy-server-nameserver:
  - https://cloudflare-dns.com/dns-query
  - https://dns.google/dns-query
  direct-nameserver:
  - system
  - 77.88.8.8
  direct-nameserver-follow-policy: true
  nameserver-policy:
    "+.ru":
    - 77.88.8.8
    - 1.1.1.1
    "+.su":
    - 77.88.8.8
    - 1.1.1.1
    "+.xn--p1ai":
    - 77.88.8.8
    - 1.1.1.1
proxy-providers:
  vless-space:
    type: http
    url: "https://YOUR_CLASH_SUBSCRIPTION_URL"
    path: ./proxy_providers/vless-space.yaml
    interval: 3600
    proxy: DIRECT
    header:
      User-Agent:
      - Agent
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
      timeout: 5000
proxies: []
proxy-groups:
- name: MANUAL
  type: select
  proxies:
  - LOW-RESTRICT-FOREIGN
  - FASTER-FOREIGN
  - RU-PROXY
  - RU
  - DIRECT
  use:
  - vless-space
- name: PROXY
  type: select
  proxies:
  - FASTER-FOREIGN
  - MANUAL
  - LOW-RESTRICT-FOREIGN
  - RU-PROXY
  - RU
  - DIRECT
- name: LOW-RESTRICT-FOREIGN
  type: select
  proxies:
  - LOW-RESTRICT-AUTO
  - LOW-RESTRICT-MANUAL
- name: LOW-RESTRICT-AUTO
  type: url-test
  url: https://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
  lazy: true
  filter: '^(?!.*(?:USA|United States|Canada|Singapore|Hong Kong|France|United Kingdom|UK|UAE|United Arab Emirates|Russia|Россия|YT|LTE|Torrent|\| RU)).*(?:Finland|Poland|Sweden).*Gemini.*$'
  use:
  - vless-space
- name: LOW-RESTRICT-MANUAL
  type: select
  filter: '^(?!.*(?:USA|United States|Canada|Singapore|Hong Kong|France|United Kingdom|UK|UAE|United Arab Emirates|Russia|Россия|YT|LTE|Torrent|\| RU)).*(?:Finland|Poland|Sweden).*Gemini.*$'
  use:
  - vless-space
- name: FASTER-FOREIGN
  type: url-test
  url: https://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
  lazy: true
  filter: '^(?!.*(?:USA|United States|Canada|Russia|Россия|YT|LTE|Torrent|\| RU)).*(?:Finland|Netherlands|Poland|Sweden).*Gemini.*$'
  use:
  - vless-space
- name: RU
  type: url-test
  url: http://connectivitycheck.gstatic.com/generate_204
  interval: 300
  tolerance: 50
  lazy: true
  filter: '^(?:.*Russia \| YT|.*Russia #2 \| YT|.*Russia \| LTE \| YT|.*Russia #2 \| LTE \| YT)$'
  use:
  - vless-space
- name: RU-PROXY
  type: fallback
  url: https://www.avito.ru
  interval: 300
  timeout: 5000
  lazy: false
  proxies:
  - RU

rule-providers:
  steam:
    type: http
    behavior: classical
    path: "./rules/steam.list"
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/Steam/Steam.list
    interval: 86400
  domains_geo_detect:
    type: http
    behavior: classical
    path: "./rules/domains_geo_detect.list"
    url: https://raw.githubusercontent.com/misha-tgshv/shadowrocket-configuration-file/refs/heads/main/rules/domains_geo_detect.list
    interval: 86400
  ru-bundle:
    type: http
    behavior: domain
    format: mrs
    path: "./rules/ru-bundle/rule.mrs"
    url: https://github.com/legiz-ru/mihomo-rule-sets/raw/main/ru-bundle/rule.mrs
    interval: 86400
  rknasnblock:
    type: http
    behavior: ipcidr
    format: mrs
    path: "./rules/ru-bundle/rknasnblock.mrs"
    url: https://github.com/legiz-ru/mihomo-rule-sets/raw/main/ru-bundle/rknasnblock.mrs
    interval: 86400
  ru-app-list:
    type: http
    behavior: classical
    format: yaml
    path: "./rules/ru-app-list.yaml"
    url: https://github.com/legiz-ru/mihomo-rule-sets/raw/main/other/ru-app-list.yaml
    interval: 86400
rules:
- DOMAIN-SUFFIX,chatgpt.com,PROXY
- DOMAIN-SUFFIX,openai.com,PROXY
- DOMAIN-SUFFIX,oaistatic.com,PROXY
- DOMAIN-SUFFIX,oaiusercontent.com,PROXY
- DOMAIN-SUFFIX,auth0.com,PROXY
- DOMAIN-SUFFIX,github.com,DIRECT
- DOMAIN-SUFFIX,githubusercontent.com,DIRECT
- DOMAIN,your-provider.example,DIRECT
- DOMAIN,bybit-exchange.github.io,LOW-RESTRICT-FOREIGN
- DOMAIN,bybit.ada.support,LOW-RESTRICT-FOREIGN
- DOMAIN-SUFFIX,bycsi.com,LOW-RESTRICT-FOREIGN
- DOMAIN-SUFFIX,byapis.com,LOW-RESTRICT-FOREIGN
- DOMAIN-SUFFIX,bycbe.com,LOW-RESTRICT-FOREIGN
- DOMAIN-SUFFIX,bymj.io,LOW-RESTRICT-FOREIGN
- DOMAIN-SUFFIX,byabcde.com,LOW-RESTRICT-FOREIGN
- DOMAIN-SUFFIX,byapps.net,LOW-RESTRICT-FOREIGN
- DOMAIN-SUFFIX,byd3c3.com,LOW-RESTRICT-FOREIGN
- DOMAIN-SUFFIX,bybit.biz,LOW-RESTRICT-FOREIGN
- DOMAIN-SUFFIX,bybdc6.com,LOW-RESTRICT-FOREIGN
- DOMAIN-SUFFIX,bybit-global.com,LOW-RESTRICT-FOREIGN
- DOMAIN-SUFFIX,bybit.cloud,LOW-RESTRICT-FOREIGN
- DOMAIN-SUFFIX,bybit.org,LOW-RESTRICT-FOREIGN
- DOMAIN-SUFFIX,bybit.com,LOW-RESTRICT-FOREIGN
- DOMAIN-SUFFIX,bybitglobal.com,LOW-RESTRICT-FOREIGN
- DOMAIN-SUFFIX,bytick.com,LOW-RESTRICT-FOREIGN
- DOMAIN-SUFFIX,bybit-tr.com,LOW-RESTRICT-FOREIGN
- DOMAIN-SUFFIX,bybit.kz,LOW-RESTRICT-FOREIGN
- DOMAIN-SUFFIX,bybit.nl,LOW-RESTRICT-FOREIGN
- DOMAIN-SUFFIX,bybit.eu,LOW-RESTRICT-FOREIGN
- DOMAIN-KEYWORD,bybit,LOW-RESTRICT-FOREIGN
- DOMAIN-KEYWORD,bytick,LOW-RESTRICT-FOREIGN
- RULE-SET,steam,DIRECT
- RULE-SET,domains_geo_detect,DIRECT
- RULE-SET,ru-bundle,DIRECT
- RULE-SET,rknasnblock,DIRECT,no-resolve
- RULE-SET,ru-app-list,DIRECT
- DOMAIN-KEYWORD,steam,DIRECT
- DOMAIN-KEYWORD,valve,DIRECT
- DOMAIN-KEYWORD,sdr,DIRECT
- DOMAIN-SUFFIX,ru,DIRECT
- DOMAIN-SUFFIX,su,DIRECT
- DOMAIN-SUFFIX,xn--p1ai,DIRECT
- DOMAIN-SUFFIX,local,DIRECT
- IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
- IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
- IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
- IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
- IP-CIDR,169.254.0.0/16,DIRECT,no-resolve
- PROCESS-NAME,CrossOver,DIRECT
- PROCESS-NAME,wineserver,DIRECT
- PROCESS-NAME,wineloader,DIRECT
- PROCESS-NAME,winewrapper.exe,DIRECT
- PROCESS-NAME,winedevice.exe,DIRECT
- PROCESS-NAME,Menu Helper,DIRECT
- PROCESS-NAME,steam.exe,DIRECT
- PROCESS-NAME,steamservice.exe,DIRECT
- PROCESS-NAME,steamwebhelper.exe,DIRECT
- PROCESS-NAME-REGEX,(?i).*\.exe$,DIRECT
- PROCESS-PATH-REGEX,(?i).*CrossOver.*,DIRECT
- GEOIP,RU,DIRECT
- MATCH,PROXY
